# ============================================================================
# Docker Compose — Production (Pre-built Images)
#
# For users who just want to run Wardkeep without building from source.
# Images are pulled from GitHub Container Registry.
#
# Usage:
#   1. Copy .env.example to .env and set ENCRYPTION_KEY
#   2. docker compose -f docker-compose.prod.yml up -d
#
# Update:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
# ============================================================================

services:
  web:
    image: ghcr.io/reymundovera/wardkeep-web:latest
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-4000}/api
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    image: ghcr.io/reymundovera/wardkeep-api:latest
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-wardkeep}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_PRIVACY_MODE=${AI_PRIVACY_MODE:-LOCAL}
      - OLLAMA_URL=http://ollama:11434
      - SESSION_TIMEOUT=${SESSION_TIMEOUT:-30}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env}
      - PORT=4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    image: ghcr.io/reymundovera/wardkeep-worker:latest
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-wardkeep}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_PRIVACY_MODE=${AI_PRIVACY_MODE:-LOCAL}
      - OLLAMA_URL=http://ollama:11434
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-wardkeep}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ai
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pg_data:
  redis_data:
  ollama_models:
