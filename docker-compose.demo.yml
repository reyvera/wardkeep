# ============================================================================
# Docker Compose — Demo Instance (Lightweight)
# No Ollama, no worker. Just web + api + postgres + redis.
# ~1GB RAM, 1 CPU core, 5GB storage.
#
# Usage:
#   docker compose -f docker-compose.demo.yml up -d
#   docker compose -f docker-compose.demo.yml exec api npx ts-node prisma/seed-demo.ts
# ============================================================================

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wardkeep
    volumes:
      - demo_pg_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wardkeep?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 4000
      SESSION_TIMEOUT: 60
      ENCRYPTION_KEY: demo-encryption-key-not-for-production
      AI_PRIVACY_MODE: LOCAL
      DEMO_MODE: 'true'
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api
        NEXT_PUBLIC_DEMO_MODE: 'true'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_DEMO_MODE: 'true'
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy

volumes:
  demo_pg_data:
